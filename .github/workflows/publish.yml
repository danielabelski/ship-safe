name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Self-scan
        run: node cli/bin/ship-safe.js scan .

      - name: Verify package contents
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-contents.txt
          echo ""
          echo "=== Verifying no sensitive files ==="
          if grep -iE '\.env|credentials|secret|\.pem|\.key' /tmp/pack-contents.txt; then
            echo "::error::Sensitive files detected in package contents"
            exit 1
          fi
          echo "Package contents look clean."

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
