# Example: add this to YOUR repo at .github/workflows/security.yml
# Full docs: https://shipsafecli.com/docs

name: Security Scan
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ship Safe Security Scan
        run: |
          set +e
          npx --yes ship-safe@latest ci . \
            --threshold 70 \
            --json \
            --no-ai \
            --sarif results.sarif
          EXIT_CODE=$?
          set -e
          exit $EXIT_CODE

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('results.sarif') != ''
        with:
          sarif_file: results.sarif
